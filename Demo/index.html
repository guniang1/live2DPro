<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ddd9d4">
  <title>Live2D · 小陪伴</title>
  <style>
    :root {
      --chat-width: min(40vw, 420px);
      --bg-deep: #d8d4cf;
      --bg-panel: rgba(228, 224, 218, 0.94);
      --bg-panel-solid: #e2ded8;
      --border-subtle: rgba(70, 65, 60, 0.1);
      --border-glow: rgba(140, 120, 110, 0.22);
      --text-primary: #5a5550;
      --text-muted: rgba(90, 85, 80, 0.48);
      --accent: #b8a090;
      --accent-2: #a89888;
      --accent-soft: rgba(120, 105, 95, 0.14);
      --user-bubble: #e0dbd6;
      --ai-bubble: #e2daf5;
      --ai-bubble-text: #3d3558;
      --ai-bubble-border: rgba(95, 65, 165, 0.24);
      --radius-lg: 18px;
      --radius-md: 14px;
      --shadow-panel: 0 0 0 1px var(--border-subtle), 0 12px 28px rgba(40, 38, 36, 0.06);
      --font: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      overflow: hidden;
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text-primary);
    }

    html {
      overscroll-behavior-x: none;
      touch-action: none;
    }

    body {
      position: relative;
      background:
        radial-gradient(ellipse 100% 70% at 12% 8%, rgba(200, 175, 160, 0.22), transparent 55%),
        radial-gradient(ellipse 90% 55% at 88% 18%, rgba(175, 168, 185, 0.16), transparent 50%),
        linear-gradient(168deg, #e0dcd6 0%, #d8d4cf 42%, #d2cec8 100%);
    }

    #app-layout {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    #chat-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: var(--chat-width);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
      background: var(--bg-panel);
      backdrop-filter: blur(14px) saturate(0.92);
      -webkit-backdrop-filter: blur(14px) saturate(0.92);
      border-right: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-panel);
    }

    #chat-header {
      flex-shrink: 0;
      padding: 20px 20px 16px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-subtle);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
    }

    #chat-header::before {
      content: "";
      display: block;
      width: 36px;
      height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent-2), transparent);
      margin-bottom: 10px;
      opacity: 0.75;
    }

    #chat-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 18px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #chat-list::-webkit-scrollbar {
      width: 6px;
    }

    #chat-list::-webkit-scrollbar-thumb {
      background: rgba(100, 95, 90, 0.2);
      border-radius: 10px;
    }

    #chat-list::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat-input-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 18px;
      border-top: 1px solid var(--border-subtle);
      background: linear-gradient(0deg, rgba(218, 214, 208, 0.9) 0%, rgba(228, 224, 218, 0.4) 100%);
    }

    #chat-input {
      flex: 1;
      min-width: 0;
      height: 48px;
      padding: 0 18px;
      border: 1px solid var(--border-subtle);
      border-radius: 999px;
      outline: none;
      font-size: 15px;
      color: var(--text-primary);
      background: rgba(236, 232, 228, 0.92);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #chat-input::placeholder {
      color: var(--text-muted);
    }

    #chat-input:focus {
      border-color: rgba(110, 100, 95, 0.28);
      box-shadow: 0 0 0 2px var(--accent-soft);
    }

    #send-btn {
      height: 48px;
      padding: 0 22px;
      border: 1px solid rgba(90, 85, 80, 0.12);
      border-radius: 999px;
      color: #4d4844;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: linear-gradient(145deg, #d4cec8 0%, #c8c0b8 100%);
      box-shadow: 0 2px 8px rgba(40, 38, 36, 0.06);
      transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.2s;
    }

    #send-btn:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(40, 38, 36, 0.08);
    }

    #send-btn:active {
      transform: translateY(0);
    }

    .chat-item {
      max-width: 88%;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 1px 4px rgba(40, 38, 36, 0.04);
    }

    .chat-item.user {
      align-self: flex-end;
      color: #524c48;
      background: var(--user-bubble);
      border: 1px solid rgba(90, 85, 80, 0.08);
      border-bottom-right-radius: 6px;
    }

    .chat-item.ai,
    .chat-item.remind {
      align-self: flex-start;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      min-width: 0;
      color: var(--ai-bubble-text);
      background: linear-gradient(145deg, #ebe4f8 0%, #e2daf5 48%, #d9cbf0 100%);
      border: 1px solid var(--ai-bubble-border);
      border-bottom-left-radius: 6px;
      box-shadow: 0 1px 6px rgba(75, 50, 130, 0.09);
    }

    /* 角色侧气泡：紫藤花图标（悬挂花序示意） */
    .chat-item.ai::before,
    .chat-item.remind::before {
      content: "";
      flex-shrink: 0;
      width: 1.25em;
      height: 1.35em;
      margin-top: 2px;
      background: url("data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2020%2024%22%20aria-hidden%3D%22true%22%3E%3Cpath%20stroke%3D%22%236b4eae%22%20stroke-width%3D%221.35%22%20stroke-linecap%3D%22round%22%20fill%3D%22none%22%20d%3D%22M10%202v4.5%22%2F%3E%3Cellipse%20cx%3D%227%22%20cy%3D%2210.5%22%20rx%3D%222.4%22%20ry%3D%223.4%22%20fill%3D%22%239580d9%22%20transform%3D%22rotate(-14%207%2010.5)%22%2F%3E%3Cellipse%20cx%3D%2213%22%20cy%3D%2211.5%22%20rx%3D%222.4%22%20ry%3D%223.4%22%20fill%3D%22%237c5dce%22%20transform%3D%22rotate(11%2013%2011.5)%22%2F%3E%3Cellipse%20cx%3D%229%22%20cy%3D%2216.5%22%20rx%3D%222.1%22%20ry%3D%223.1%22%20fill%3D%22%23b49cf0%22%20transform%3D%22rotate(-8%209%2016.5)%22%2F%3E%3Cellipse%20cx%3D%2212%22%20cy%3D%2218.5%22%20rx%3D%222.1%22%20ry%3D%223.1%22%20fill%3D%22%238562d8%22%20transform%3D%22rotate(9%2012%2018.5)%22%2F%3E%3C%2Fsvg%3E")
        center / contain no-repeat;
      opacity: 0.88;
    }

    .chat-item.ai.chat-item--waiting {
      color: rgba(55, 48, 72, 0.72);
      font-style: italic;
    }

    .chat-item--waiting .chat-waiting-label {
      margin-right: 2px;
    }

    .chat-item--waiting .chat-waiting-dots {
      display: inline-block;
      animation: chat-waiting-dots 1.05s steps(4, end) infinite;
      letter-spacing: 1px;
      opacity: 0.85;
    }

    @keyframes chat-waiting-dots {
      0%,
      100% {
        opacity: 0.35;
        transform: translateY(0);
      }
      50% {
        opacity: 1;
        transform: translateY(-1px);
      }
    }

    #live2d-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: calc(100vw - var(--chat-width));
      height: 100vh;
      height: 100dvh;
      pointer-events: none;
    }

    body > canvas {
      position: fixed;
      top: 0;
      right: 0;
      width: calc(100vw - var(--chat-width)) !important;
      height: 100vh !important;
      height: 100dvh !important;
      z-index: 1;
    }

    #live2d-toolbar {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 10px;
      padding: 8px;
      border-radius: 999px;
      background: rgba(220, 216, 210, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-subtle);
      box-shadow: 0 6px 18px rgba(40, 38, 36, 0.06);
      pointer-events: auto;
      z-index: 110;
    }

    #toolbar-gear-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      order: 2;
      width: 46px;
      height: 46px;
      padding: 0;
      border: 1px solid var(--border-subtle);
      border-radius: 50%;
      color: #5a5550;
      cursor: pointer;
      flex-shrink: 0;
      background: linear-gradient(145deg, #e8e4df 0%, #dcd8d2 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
      transition: transform 0.2s ease, border-color 0.2s, box-shadow 0.2s;
    }

    #toolbar-gear-btn:hover {
      border-color: rgba(90, 85, 80, 0.15);
      box-shadow: 0 0 0 2px var(--accent-soft);
    }

    #toolbar-gear-btn img {
      width: 22px;
      height: 22px;
      display: block;
      pointer-events: none;
      opacity: 0.72;
      transition: transform 0.28s ease;
    }

    #live2d-toolbar.is-expanded #toolbar-gear-btn img {
      transform: rotate(90deg);
    }

    #toolbar-expand {
      display: none;
      order: 1;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      min-width: 228px;
      max-width: min(260px, 42vw);
      padding: 6px 4px 4px;
    }

    #live2d-toolbar.is-expanded #toolbar-expand {
      display: flex;
    }

    #live2d-toolbar.is-expanded {
      border-radius: 22px;
      align-items: stretch;
    }

    .toolbar-divider {
      height: 1px;
      margin: 4px 2px;
      border: none;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(120, 105, 95, 0.14) 20%,
        rgba(120, 105, 95, 0.14) 80%,
        transparent
      );
    }

    .toolbar-care-card {
      padding: 12px 12px 11px;
      border-radius: var(--radius-md);
      background:
        linear-gradient(145deg, rgba(255, 252, 250, 0.55) 0%, rgba(236, 230, 224, 0.72) 100%);
      border: 1px solid rgba(140, 118, 108, 0.14);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.45),
        0 4px 14px rgba(55, 48, 42, 0.05);
    }

    .toolbar-care-card__header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .toolbar-care-card__icon-wrap {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: linear-gradient(145deg, rgba(196, 168, 156, 0.35) 0%, rgba(176, 148, 138, 0.22) 100%);
      border: 1px solid rgba(130, 108, 98, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
      font-size: 15px;
      line-height: 1;
      color: #7a6560;
    }

    .toolbar-care-card__titles {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toolbar-care-card__title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #524842;
    }

    .toolbar-care-card__subtitle {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.92;
    }



    #remind-scan-now-btn {
      width: 100%;
      min-height: 42px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(110, 82, 72, 0.22);
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #fffaf8;
      text-shadow: 0 1px 1px rgba(45, 38, 34, 0.18);
      background: linear-gradient(155deg, #c9a396 0%, #b88978 42%, #a87b6c 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        0 3px 10px rgba(95, 72, 62, 0.18);
      transition:
        transform 0.16s ease,
        filter 0.16s ease,
        box-shadow 0.2s ease;
    }

    #remind-scan-now-btn:hover:not(:disabled) {
      filter: brightness(1.04) saturate(1.02);
      transform: translateY(-1px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.32),
        0 5px 16px rgba(95, 72, 62, 0.22);
    }

    #remind-scan-now-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    #remind-scan-now-btn:disabled {
      opacity: 0.72;
      cursor: wait;
      transform: none;
      filter: saturate(0.92);
    }

    #remind-scan-now-btn .toolbar-btn-care__glyph {
      font-size: 15px;
      line-height: 1;
      opacity: 0.95;
      font-variant-numeric: tabular-nums;
    }

    #remind-scan-now-btn .toolbar-btn-care__label {
      flex: 1;
      text-align: center;
      min-width: 0;
    }

    #model-next-btn,
    #bg-next-btn,
    #upload-model-btn,
    #upload-tts-btn,
    #upload-character-btn,
    #long-memory-consolidate-btn,
    #logout-btn {
      height: 38px;
      padding: 0 14px;
      border: 1px solid var(--border-subtle);
      border-radius: 999px;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: rgba(236, 232, 228, 0.85);
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    #model-next-btn:hover,
    #bg-next-btn:hover,
    #upload-model-btn:hover,
    #upload-tts-btn:hover,
    #upload-character-btn:hover,
    #long-memory-consolidate-btn:hover {
      background: rgba(210, 206, 200, 0.95);
      border-color: rgba(90, 85, 80, 0.12);
    }

    #long-memory-consolidate-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    #logout-btn {
      background: rgba(212, 200, 200, 0.75);
      border-color: rgba(120, 95, 95, 0.18);
      color: #6a5050;
    }

    #logout-btn:hover {
      background: rgba(205, 192, 192, 0.88);
    }

    #live2d-toolbar #model-status,
    #live2d-toolbar #bg-status {
      max-width: 160px;
      padding: 0 6px 2px;
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.4;
      word-break: break-all;
    }

    #record-ui {
      position: fixed;
      right: max(18px, env(safe-area-inset-right));
      bottom: max(20px, env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px 10px 12px;
      border-radius: 999px;
      background: rgba(220, 216, 210, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-subtle);
      box-shadow: 0 8px 22px rgba(40, 38, 36, 0.07);
      pointer-events: auto;
      z-index: 100;
    }

    #record-btn {
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 50%;
      font-size: 22px;
      line-height: 1;
      color: #f5f3f0;
      cursor: pointer;
      /* background: linear-gradient(145deg, #b0a8a4 0%, #9a928e 100%); */
      box-shadow: 0 3px 12px rgba(40, 38, 36, 0.12);
      transition: transform 0.15s ease, box-shadow 0.2s;
    }

    #record-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 14px rgba(40, 38, 36, 0.14);
      background-color: rgb(93, 199, 79);
    }



    #record-status {
      max-width: 220px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 720px) {
      :root {
        --chat-width: min(92vw, 340px);
      }
    }
  </style>
</head>

<body>
  <div id="app-layout">
    <aside id="chat-panel">
      <div id="chat-header">和 Ta 聊聊天</div>
      <div id="chat-list" role="log" aria-live="polite" aria-relevant="additions"></div>
      <div id="chat-input-bar">
        <input id="chat-input" type="text" placeholder="想说的话，写在这里…" autocomplete="off" enterkeyhint="send">
        <button type="button" id="send-btn">发送</button>
      </div>
    </aside>
    <main id="live2d-panel"></main>
  </div>

  <div id="live2d-toolbar">
    <button type="button" id="toolbar-gear-btn" aria-label="展开工具" aria-expanded="false" title="小工具">
      <img src="/Resources/icon_gear.png" alt="" width="22" height="22">
    </button>
    <div id="toolbar-expand">
      <button type="button" id="model-next-btn">切换模型</button>
      <span id="model-status"></span>
      <button type="button" id="bg-next-btn">切换背景</button>
      <span id="bg-status"></span>
      <button type="button" id="upload-model-btn">上传模型</button>
      <button type="button" id="upload-tts-btn">上传音色</button>
      <button type="button" id="upload-character-btn">角色定义</button>
      <button
        type="button"
        id="long-memory-consolidate-btn"
        data-default-label="总结长期记忆"
        title="基于近期对话立即生成/追加长期记忆摘要（需 Ollama；不受后台 24 小时周期限制；无窗口内会话或模型未产出时不会写入）"
        aria-label="总结长期记忆：根据近期对话立即更新周期概要"
      >
        总结长期记忆
      </button>

      <div class="toolbar-divider" aria-hidden="true"></div>

      <div class="toolbar-care-card" role="region" aria-label="定时关怀">
        <div class="toolbar-care-card__header">
          <span class="toolbar-care-card__icon-wrap" aria-hidden="true">⏱</span>
          <div class="toolbar-care-card__titles">
            <span class="toolbar-care-card__title">定时关怀</span>
            <span class="toolbar-care-card__subtitle">到期触发 · 手动扫描</span>
          </div>
        </div>

        <button
          type="button"
          id="remind-scan-now-btn"
          data-default-label="立即扫描到期项"
          title="请求服务端立即扫描 remind_trigger；需 WebSocket 聊天在线才有气泡"
          aria-label="定时关怀：立即扫描到期未触发的提醒"
        >
          <span class="toolbar-btn-care__glyph" aria-hidden="true">◎</span>
          <span class="toolbar-btn-care__label">立即扫描到期项</span>
        </button>
      </div>

      <button type="button" id="logout-btn">退出登录</button>
    </div>
  </div>

  <div id="record-ui">
    <button type="button" id="record-btn" aria-label="语音输入">🎤</button>
    <span id="record-status">点一下，用声音聊～</span>
  </div>

  <script>
    (function () {
      const raw = localStorage.getItem("live2d_info");
      let auth = null;
      try {
        auth = raw ? JSON.parse(raw) : null;
      } catch (e) {
        auth = null;
      }
      const isLoggedIn = Boolean(auth && auth.user_id && auth.username);
      if (!isLoggedIn) {
        const redirect = `${location.pathname}${location.search}${location.hash}`;
        const loginUrl = `./src/pages/Login.html?redirect=${encodeURIComponent(redirect)}`;
        location.replace(loginUrl);
      }
    })();

    document.addEventListener("DOMContentLoaded", function () {
      const logoutBtn = document.getElementById("logout-btn");
      if (logoutBtn) {
        logoutBtn.addEventListener("click", function () {
          localStorage.removeItem("live2d_info");
          location.replace("./src/pages/Login.html");
        });
      }
    });
  </script>

  <script src="./dist/Core/live2dcubismcore.js"></script>
  <script src="./src/main.js" type="module"></script>
</body>

</html>
